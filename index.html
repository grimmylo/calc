  <style>

    .tab.active{background:var(--blue);color:#fff;border-color:var(--blue)}
    .role{display:none}.role.active{display:block}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}

    .field{margin-bottom:12px}.field label{display:block;font-size:13px;margin-bottom:6px}

    .muted{font-size:12px;color:#6b7280}

    .place{border:1px dashed var(--border);padding:10px;border-radius:8px;margin-bottom:10px}
    .services{columns:2}
    .service-row{break-inside:avoid;display:flex;align-items:center;gap:8px;margin:7px 0}
    .btn{background:var(--blue);color:#fff;border:0;padding:11px 18px;border-radius:8px;cursor:pointer}
    .btn.secondary{background:#fff;color:var(--blue);border:1px solid var(--blue)}

    .result-total{font-size:34px;color:var(--blue);font-weight:700}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th,td{border:1px solid var(--border);padding:8px;text-align:left}
    th{background:#f8fafc}
    .admin{display:grid;grid-template-columns:260px 1fr;gap:16px}
    .menu button{display:block;width:100%;text-align:left;margin-bottom:8px}
    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center}
    .modal{width:560px;max-width:95vw;background:#fff;border-radius:10px;padding:16px}
    .open{display:flex}
    .hidden{display:none}
    :root{--blue:#1a73e8;--border:#e0e0e0;--bg:#fff;--text:#1f1f1f;--muted:#5f6368}

    .wrap{max-width:1280px;margin:18px auto;padding:0 16px}.card{background:var(--bg);border:1px solid var(--border);border-radius:12px}
    .tabs{display:flex;gap:10px;padding:10px}.tab{padding:10px 14px;border:1px solid var(--border);border-radius:10px;cursor:pointer;background:#fff}.tab.active{background:var(--blue);color:#fff;border-color:var(--blue)}
    .grid2{display:grid;grid-template-columns:1.2fr 1fr;gap:16px;padding:16px}.form-section{border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:12px}

    input,select,button{font:inherit} input,select{width:100%;padding:9px;border:1px solid var(--border);border-radius:8px;background:#fff}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
    .counter{display:flex;align-items:center;gap:8px}.counter button{width:30px;height:30px;border:1px solid var(--border);background:#fff;border-radius:8px;cursor:pointer}
    .counter span{min-width:30px;text-align:center;font-weight:600}.link{color:var(--blue);text-decoration:underline;cursor:pointer;font-size:13px}
    .btn-main{width:100%;padding:12px;border:none;border-radius:10px;background:var(--blue);color:#fff;font-weight:700;cursor:pointer}
    .services{display:grid;grid-template-columns:1fr 1fr;gap:8px}.service{display:flex;align-items:center;gap:8px;font-size:14px}
    .result .total{font-size:34px;font-weight:800;color:var(--blue)} .muted{color:var(--muted)} .line{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed var(--border);font-size:14px}
    .admin{display:grid;grid-template-columns:280px 1fr;min-height:760px}.menu{border-right:1px solid var(--border);padding:12px}.menu button{width:100%;text-align:left;border:1px solid var(--border);background:#fff;padding:9px;border-radius:8px;margin-bottom:8px;cursor:pointer}

    table{width:100%;border-collapse:collapse;font-size:13px} th,td{border:1px solid var(--border);padding:6px;text-align:left} th{background:#f4f7ff}
    .hidden{display:none}.chips{display:flex;gap:8px;flex-wrap:wrap}.chip{border:1px solid var(--border);padding:3px 8px;border-radius:999px;font-size:12px}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.3);display:none;align-items:center;justify-content:center}.modal.open{display:flex}.modal-box{width:440px;background:#fff;border-radius:12px;padding:16px}
  </style>

 if(s==='zones')return `<h3>Тарифные зоны</h3><button class='btn' onclick="openModal('Создать зону')">+ Создать зону</button><table><tr><th>ID</th><th>Название</th><th>Код</th><th>Города</th></tr>${DB.cities.map(c=>`<tr><td>${c.id}</td><td>${c.display_name}</td><td>${c.code}</td><td>${c.display_name}</td></tr>`).join('')}</table>`;
 if(s==='tariffs')return `<h3>Тарифы</h3><select><option>Москва</option></select> <select><option>Санкт-Петербург</option></select><table><tr><th>Откуда</th><th>Куда</th><th>Сезон</th><th>Плотность</th><th>Мин.цена</th></tr>${Object.entries(DB.tariffs).map(([k,v])=>`<tr><td>${k.split('-')[0]}</td><td>${k.split('-')[1]}</td><td>Базовый</td><td>${v.density}</td><td>${v.min}</td></tr>${v.rows.map(r=>`<tr><td colspan='5'>${r.t} | до ${r.w} кг / ${r.v} м³ ${r.f?`| ${r.f}₽`:`| ${r.kg}/кг ${r.m3}/м³`}</td></tr>`).join('')}`).join('')}</table>`;
 if(s==='special')return `<h3>Особые тарифы</h3><button class='btn' onclick="openModal('Добавить спецтариф')">+ Добавить</button><table><tr><th>Тип</th><th>Откуда</th><th>Куда</th><th>Мин.цена</th><th>Приоритет</th></tr><tr><td>Город→Город</td><td>Москва</td><td>Судак</td><td>1000</td><td>1</td></tr><tr><td>Город→Зона</td><td>Москва</td><td>Крым</td><td>1200</td><td>2</td></tr></table>`;
 if(s==='surcharges')return `<h3>Надбавки</h3><button class='btn' onclick="openModal('Добавить надбавку')">+ Добавить</button><table><tr><th>Код</th><th>Название</th><th>Условие</th><th>Порог</th><th>Процент</th></tr><tr><td>HEAVY_1000</td><td>Тяжеловес</td><td>вес места</td><td>1000</td><td>25%</td></tr><tr><td>OVERSIZE_3M</td><td>Негабарит</td><td>длина места</td><td>3</td><td>30%</td></tr></table>`;
 if(s==='transfer')return `<h3>Трансфер</h3><table><tr><th>Город</th><th>От терминала</th><th>До терминала</th><th>Цена/м³</th><th>Цена/кг</th><th>Мин.цена</th></tr>${DB.transfer.map(t=>`<tr><td>${t.city}</td><td>${t.from}</td><td>${t.to}</td><td>${t.m3}</td><td>${t.kg}</td><td>${t.min}</td></tr>`).join('')}</table>`;
 if(s==='services')return `<h3>Услуги</h3><table><tr><th>Код</th><th>Название</th><th>Категория</th><th>Метод</th><th>Ставка</th><th>Мин.</th></tr><tr><td>INSURANCE</td><td>Страхование</td><td>Фин.</td><td>PERCENT_DECLARED</td><td>0.2%</td><td>40</td></tr><tr><td>DOOR_SERVICE</td><td>Доставка от/до двери</td><td>Логистика</td><td>TIERED_BY_CITY</td><td>MSK grid</td><td>-</td></tr></table><h4>Тарифная сетка DOOR_SERVICE (Москва)</h4><table><tr><th>до кг</th><th>до м³</th><th>цена</th></tr>${DB.doorMSK.map(d=>`<tr><td>${d.w}</td><td>${d.v}</td><td>${d.p}</td></tr>`).join('')}</table>`;
 if(s==='sla')return `<h3>Сроки доставки</h3><table><tr><th>Откуда</th><th>Куда</th><th>Срок</th></tr>${Object.entries(DB.sla).map(([k,v])=>`<tr><td>${k.split('-')[0]}</td><td>${k.split('-')[1]}</td><td>${v}</td></tr>`).join('')}</table>`;
 return `<h3>Настройки</h3><div class='field'><label>Коэффициент укладки</label><input value='1.1'></div><div class='field'><label>Ставка оценочной стоимости</label><input value='0.2%'></div><div class='field'><label>Оценка без документов</label><input value='400 руб/кг'></div>`
}
function openModal(title){document.getElementById('modal').innerHTML=`<h3>${title}</h3><div class='field'><label>Название</label><input></div><div class='field'><label>Код</label><input></div><button class='btn' onclick='closeModal()'>Сохранить (демо)</button>`;document.getElementById('modalWrap').classList.add('open')}
function closeModal(){document.getElementById('modalWrap').classList.remove('open')}
document.getElementById('modalWrap').onclick=e=>{if(e.target.id==='modalWrap')closeModal()}
function switchRole(role){state.role=role;document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.role===role));document.querySelectorAll('.role').forEach(r=>r.classList.toggle('active',r.id===role));if(role==='client'||role==='manager')setupCalc(role);if(role==='admin')renderAdmin()}
function openModal(t){document.getElementById('modalTitle').textContent=t;document.getElementById('modal').classList.add('open')} function closeModal(){document.getElementById('modal').classList.remove('open')}
function switchRole(role){['client','manager','admin'].forEach(r=>{document.getElementById('role-'+r).classList.toggle('hidden',r!==role)});document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.role===role))}
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>switchRole(t.dataset.role));
setupCalc('client'); setupCalc('manager'); renderAdmin(); switchRole('client');
document.body.insertAdjacentHTML('beforeend',`<datalist id='cityList'>${cities.map(c=>`<option value='${c.name}'>`).join('')}</datalist>`);
renderCalculator(document.getElementById('role-client'),false);renderCalculator(document.getElementById('role-manager'),true);renderAdmin();
</script>
